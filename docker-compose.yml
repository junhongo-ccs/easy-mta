version: "3.9"

services:
  app:
    build: ./backend
    container_name: easy-mta
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
