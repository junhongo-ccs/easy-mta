<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Easy MTA – ニューヨーク地下鉄リアルタイムガイド (日本語)">
  <title>🗽 Easy MTA – ニューヨーク地下鉄ガイド</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Top Bar ──────────────────────────────────────────── -->
<header id="topbar" role="banner">
  <div id="topbar-title">🗽 Easy MTA <span>ニューヨーク地下鉄ガイド</span></div>
  <div id="topbar-controls">
    <span class="status-dot" id="status-indicator" title="接続確認中"></span>
    <span class="status-label" id="status-label">リアルタイム</span>
    <button class="icon-btn" id="refresh-btn" title="リアルタイムデータを更新" aria-label="更新">
      ↺
    </button>
  </div>
</header>

<!-- ── Main Layout ──────────────────────────────────────── -->
<div id="main" role="main">

  <!-- ── Left: Map Panel ──────────────────────────────── -->
  <section id="map-panel" aria-label="ニューヨーク地下鉄地図">

    <!-- Map container -->
    <div id="map" aria-label="インタラクティブ地図"></div>

    <!-- Map overlay controls -->
    <div id="map-controls">
      <button class="icon-btn" id="accessibility-btn"
              title="バリアフリー駅のみ表示"
              aria-label="バリアフリーフィルター"
              aria-pressed="false">
        ♿
      </button>
    </div>

    <!-- Route legend -->
    <div id="legend-container" aria-label="路線凡例">
      <div id="route-legend">
        <div class="legend-title">路線カラー</div>

        <div class="legend-row">
          <div class="legend-badges">
            <span class="route-badge" style="background:#EE352E;color:#fff">1</span>
            <span class="route-badge" style="background:#EE352E;color:#fff">2</span>
            <span class="route-badge" style="background:#EE352E;color:#fff">3</span>
          </div>
          <span style="font-size:0.75rem;color:var(--text-secondary)">IRT Broadway</span>
        </div>

        <div class="legend-row">
          <div class="legend-badges">
            <span class="route-badge" style="background:#00933C;color:#fff">4</span>
            <span class="route-badge" style="background:#00933C;color:#fff">5</span>
            <span class="route-badge" style="background:#00933C;color:#fff">6</span>
          </div>
          <span style="font-size:0.75rem;color:var(--text-secondary)">IRT Lexington</span>
        </div>

        <div class="legend-row">
          <div class="legend-badges">
            <span class="route-badge" style="background:#B933AD;color:#fff">7</span>
          </div>
          <span style="font-size:0.75rem;color:var(--text-secondary)">IRT Flushing</span>
        </div>

        <div class="legend-row">
          <div class="legend-badges">
            <span class="route-badge" style="background:#0039A6;color:#fff">A</span>
            <span class="route-badge" style="background:#0039A6;color:#fff">C</span>
            <span class="route-badge" style="background:#0039A6;color:#fff">E</span>
          </div>
          <span style="font-size:0.75rem;color:var(--text-secondary)">IND Eighth Ave</span>
        </div>

        <div class="legend-row">
          <div class="legend-badges">
            <span class="route-badge" style="background:#FF6319;color:#fff">B</span>
            <span class="route-badge" style="background:#FF6319;color:#fff">D</span>
            <span class="route-badge" style="background:#FF6319;color:#fff">F</span>
            <span class="route-badge" style="background:#FF6319;color:#fff">M</span>
          </div>
          <span style="font-size:0.75rem;color:var(--text-secondary)">IND Sixth Ave</span>
        </div>

        <div class="legend-row">
          <div class="legend-badges">
            <span class="route-badge" style="background:#FCCC0A;color:#000">N</span>
            <span class="route-badge" style="background:#FCCC0A;color:#000">Q</span>
            <span class="route-badge" style="background:#FCCC0A;color:#000">R</span>
            <span class="route-badge" style="background:#FCCC0A;color:#000">W</span>
          </div>
          <span style="font-size:0.75rem;color:var(--text-secondary)">BMT Broadway</span>
        </div>

        <div class="legend-row">
          <div class="legend-badges">
            <span class="route-badge" style="background:#A7A9AC;color:#000">L</span>
          </div>
          <span style="font-size:0.75rem;color:var(--text-secondary)">BMT Canarsie</span>
        </div>

        <div class="legend-row">
          <div class="legend-badges">
            <span class="route-badge" style="background:#6CBE45;color:#fff">G</span>
          </div>
          <span style="font-size:0.75rem;color:var(--text-secondary)">IND Crosstown</span>
        </div>

        <div class="legend-row">
          <div class="legend-badges">
            <span class="route-badge" style="background:#996633;color:#fff">J</span>
            <span class="route-badge" style="background:#996633;color:#fff">Z</span>
          </div>
          <span style="font-size:0.75rem;color:var(--text-secondary)">BMT Nassau</span>
        </div>

        <div class="legend-row">
          <div class="legend-badges">
            <span class="route-badge" style="background:#808183;color:#fff">S</span>
          </div>
          <span style="font-size:0.75rem;color:var(--text-secondary)">Shuttle</span>
        </div>
      </div>
      <button id="legend-toggle">凡例 ▼</button>
    </div>

    <!-- Map command toast notification -->
    <div id="map-command-notice" role="status" aria-live="polite"></div>

  </section><!-- /#map-panel -->

  <!-- ── Right: Chat Panel ─────────────────────────────── -->
  <section id="chat-panel" aria-label="AIチャットアシスタント">

    <!-- Chat Header -->
    <header id="chat-header">
      <div>
        <div id="chat-header-title">🚇 MTA アシスタント</div>
        <div id="chat-header-subtitle">地下鉄ガイド AI（日本語対応）</div>
      </div>
      <button class="icon-btn" id="new-chat-btn" title="会話をリセット" aria-label="新しい会話">
        ✎
      </button>
    </header>

    <!-- Message area -->
    <div id="chat-messages" role="log" aria-live="polite" aria-label="チャットメッセージ"></div>

    <!-- Input area -->
    <div id="chat-input-area">
      <textarea id="chat-input"
                placeholder="メッセージを入力… (例: タイムズスクエア駅を表示して)"
                rows="1"
                aria-label="メッセージ入力欄"
                autocomplete="off"
                spellcheck="false"></textarea>
      <button id="send-btn" aria-label="送信">
        ➤
      </button>
    </div>
    <div id="chat-hint">
      Enterで送信 · Shift+Enterで改行 · 地図の駅をクリックで詳細
    </div>

  </section><!-- /#chat-panel -->

</div><!-- /#main -->

<!-- ── Scripts ───────────────────────────────────────────── -->
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN2GqBF4=" crossorigin=""></script>

<!-- App modules (order matters) -->
<script src="js/config.js"></script>
<script src="js/map.js"></script>
<script src="js/chat.js"></script>
<script src="js/app.js"></script>

</body>
</html>
