<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="都バス運行案内サイト PoC - リアルタイム車両位置とAI案内">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="都バス運行案内 PoC">
  <meta property="og:title" content="都バス運行案内サイト PoC">
  <meta property="og:description" content="リアルタイム車両位置とAIチャット案内を地図で体験できるデモ。">
  <meta property="og:image" content="/app/ogp.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="ja_JP">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="都バス運行案内サイト PoC">
  <meta name="twitter:description" content="リアルタイム車両位置とAIチャット案内を地図で体験できるデモ。">
  <meta name="twitter:image" content="/app/ogp.png">
  <link rel="icon" href="/app/favicon.png" type="image/png">
  <title>都バス運行案内サイト PoC</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Top Bar ──────────────────────────────────────────── -->
<header id="topbar" role="banner">
  <div id="topbar-title">都バス運行案内 <span>PoC</span></div>
  <div id="topbar-controls">
    <span class="status-dot" id="status-indicator" title="接続確認中"></span>
    <span class="status-label" id="status-label">リアルタイム</span>
    <button class="icon-btn" id="refresh-btn" title="リアルタイムデータを更新" aria-label="更新">
      ↺
    </button>
  </div>
</header>

<!-- ── Main Layout ──────────────────────────────────────── -->
<div id="main" role="main">

  <!-- ── Left: Map Panel ──────────────────────────────── -->
  <section id="map-panel" aria-label="都バス運行地図">

    <!-- Map container -->
    <div id="map" aria-label="インタラクティブ地図"></div>

    <!-- Live data summary -->
    <div id="legend-container" aria-label="リアルタイムデータ概要">
      <div id="route-legend">
        <div class="legend-title">リアルタイム表示</div>
        <div class="legend-stat">
          <span class="legend-stat-value" id="vehicle-count">--</span>
          <span class="legend-stat-label">台の車両</span>
        </div>
        <div class="legend-meta" id="feed-time">取得時刻: --</div>
        <div class="legend-meta">ODPT GTFS-RT VehiclePosition</div>
        <div class="legend-note">車両をクリックすると系統名・行先・更新時刻を確認できます。</div>
      </div>
      <button id="legend-toggle">概要 ▼</button>
    </div>

    <!-- Map command toast notification -->
    <div id="map-command-notice" role="status" aria-live="polite"></div>

  </section><!-- /#map-panel -->

  <!-- ── Right: Chat Panel ─────────────────────────────── -->
  <section id="chat-panel" aria-label="AIチャットアシスタント">

    <!-- Chat Header -->
    <header id="chat-header">
      <div>
        <div id="chat-header-title">都バス AI 案内</div>
        <div id="chat-header-subtitle">運行情報・停留所案内（PoC）</div>
      </div>
      <button class="icon-btn" id="new-chat-btn" title="会話をリセット" aria-label="新しい会話">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M21 12a9 9 0 1 1-2.64-6.36" />
          <path d="M21 3v6h-6" />
        </svg>
      </button>
    </header>

    <!-- Message area -->
    <div id="chat-messages" role="log" aria-live="polite" aria-label="チャットメッセージ"></div>

    <!-- Input area -->
    <div id="chat-input-area">
      <textarea id="chat-input"
                placeholder="メッセージを入力… (例: 都庁前付近のバスを見せて)"
                rows="1"
                aria-label="メッセージ入力欄"
                autocomplete="off"
                spellcheck="false"></textarea>
      <button id="send-btn" aria-label="送信">
        ➤
      </button>
    </div>
    <div id="chat-hint">
      Enterで送信 · Shift+Enterで改行 · 地図の停留所や車両をクリックで詳細
    </div>

  </section><!-- /#chat-panel -->

</div><!-- /#main -->

<!-- ── Scripts ───────────────────────────────────────────── -->
<!-- Leaflet JS -->
<script src="vendor/leaflet/leaflet.js"></script>

<!-- App modules (order matters) -->
<script src="js/config.js"></script>
<script src="js/map.js"></script>
<script src="js/chat.js"></script>
<script src="js/app.js"></script>

</body>
</html>
