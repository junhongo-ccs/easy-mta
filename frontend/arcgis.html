<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="都バス運行案内サイト PoC - ArcGIS版">
  <title>都バス運行案内サイト PoC (ArcGIS)</title>
  <link rel="icon" href="/app/favicon.png" type="image/png">

  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css">
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #1a753f;
      --ok: #3fb950;
      --err: #f85149;
      --topbar-height: 52px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif; background: var(--bg); color: var(--text); }

    #topbar {
      height: var(--topbar-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    #title { font-size: 1rem; font-weight: 700; letter-spacing: 0.02em; }
    #title span { color: var(--accent); }
    #controls { display: flex; align-items: center; gap: 10px; font-size: 0.78rem; color: var(--muted); }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
    .status-dot.connected { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
    .status-dot.error { background: var(--err); box-shadow: 0 0 6px var(--err); }
    #count { font-weight: 700; color: var(--text); }
    #viewDiv { width: 100%; height: calc(100% - var(--topbar-height)); }
  </style>
</head>
<body>
  <header id="topbar">
    <div id="title">都バス運行案内 <span>PoC ArcGIS</span></div>
    <div id="controls">
      <span id="status-indicator" class="status-dot" title="接続確認中"></span>
      <span>表示車両: <span id="count">--</span></span>
      <span id="updated-at">更新: --</span>
    </div>
  </header>

  <div id="viewDiv" aria-label="ArcGIS地図"></div>

  <script src="https://js.arcgis.com/4.30/"></script>
  <script src="js/arcgis.js"></script>
</body>
</html>
